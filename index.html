    /* =========================

    :root{
      --font-sans: "IRANSansX", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;

      --font-1: 12px;
      --font-2: 13px;
      --font-3: 14px;
      --font-4: 16px;
      --font-5: 20px;

      --fs-1: var(--font-1);
      --fs-2: var(--font-2);
      --fs-3: var(--font-3);
      --fs-4: var(--font-4);
      --fs-5: var(--font-5);

      --lh: 1.85;

      --space-1: 6px;
      --space-2: 10px;
      --space-3: 14px;
      --space-4: 18px;
      --space-5: 24px;

      --s-1: var(--space-1);
      --s-2: var(--space-2);
      --s-3: var(--space-3);
      --s-4: var(--space-4);
      --s-5: var(--space-5);

      --radius-1: 12px;
      --radius-2: 16px;
      --radius-3: 20px;
      --radius-4: 28px;

      --r-1: var(--radius-1);
      --r-2: var(--radius-2);
      --r-3: var(--radius-3);
      --r-4: var(--radius-4);

      --sidebar: 292px;
      --gap: var(--s-3);

      /* Core light palette */
      --bg: #f6f8fd;
      --bg2: #eef2fb;
      --surface: #ffffff;
      --surface-2: #f4f7ff;
      --border: #d7deee;
      --text: #0f172a;
      --text-muted: #5b6b86;
      --primary: #2563eb;
      --danger: #dc2626;
      --success: #16a34a;
      --shadow: 0 10px 28px rgba(15,23,42,.12);

      --surface-1: var(--surface);
      --surface-3: color-mix(in srgb, var(--surface-2) 72%, var(--surface) 28%);
      --surface-4: color-mix(in srgb, var(--surface-2) 84%, var(--surface) 16%);

      --muted: var(--text-muted);
      --muted-2: color-mix(in srgb, var(--text) 42%, var(--bg));

      --primary-soft: color-mix(in srgb, var(--primary) 14%, transparent);
      --primary-soft-2: color-mix(in srgb, var(--primary) 8%, transparent);
      --success-soft: color-mix(in srgb, var(--success) 14%, transparent);
      --warning: #f59e0b;
      --warning-soft: color-mix(in srgb, var(--warning) 16%, transparent);
      --danger-soft: color-mix(in srgb, var(--danger) 14%, transparent);

      --shadow-1: var(--shadow);
      --shadow-2: 0 18px 54px rgba(15,23,42,.16);

      --ring: 0 0 0 4px color-mix(in srgb, var(--primary) 20%, transparent);

      --border-strong: color-mix(in srgb, var(--primary) 30%, var(--border));
      --scrollbar-thumb: color-mix(in srgb, var(--text) 28%, transparent);
      --overlay: rgba(15,23,42,.32);
      --overlay-strong: rgba(15,23,42,.5);

      --grad:
        radial-gradient(950px 520px at 8% 10%, var(--primary-soft), transparent 60%),
        radial-gradient(980px 520px at 96% 26%, color-mix(in srgb, var(--success) 12%, transparent), transparent 55%),
        linear-gradient(180deg, var(--bg), var(--bg2));

      --flip-bg: color-mix(in srgb, var(--surface-2) 70%, var(--surface) 30%);
      --flip-border: color-mix(in srgb, var(--border) 70%, transparent);
      --flip-highlight: color-mix(in srgb, #fff 10%, transparent);
      --date-card-bg: color-mix(in srgb, var(--surface-2) 80%, transparent);
    }
html, body {
  font-family: var(--font-sans);
  font-variant-numeric: lining-nums tabular-nums;
}

button, input, textarea, select {
  font-family: inherit;
}

* {
  font-family: inherit;
}

canvas {
  font-family: var(--font-sans);
}

    *{ box-sizing:border-box; }
    .sr-only{
      position:absolute!important;width:1px!important;height:1px!important;padding:0!important;margin:-1px!important;
      overflow:hidden!important;clip:rect(0,0,0,0)!important;white-space:nowrap!important;border:0!important;
    }
    html, body{
      height:100%;
      overflow-x: hidden;
    }
    body{
      margin:0;
      font-family: var(--font-sans);
      font-size: var(--fs-4);
      color: var(--text);
      background: var(--grad);
      line-height: var(--lh);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    @media (prefers-reduced-motion: reduce){
      *{ animation: none !important; transition: none !important; scroll-behavior: auto !important; }
    }

    @keyframes viewIn{
      from{ opacity:0; transform: translateY(6px); }
      to{ opacity:1; transform: translateY(0); }
    }

    :where(button, input, select, textarea, a):focus-visible{
      outline: none;
      box-shadow: var(--ring);
      border-color: color-mix(in srgb, var(--border) 50%, var(--primary) 50%);
    }

    .app{
      display:grid;
      grid-template-columns: var(--sidebar) 1fr;
      align-items: start;
      gap: var(--gap);
      width: min(1360px, 100%);
      margin: 0 auto;
      padding: calc(var(--s-4) + env(safe-area-inset-top, 0px))
        calc(var(--s-4) + env(safe-area-inset-right, 0px))
        calc(var(--s-4) + env(safe-area-inset-bottom, 0px))
        calc(var(--s-4) + env(safe-area-inset-left, 0px));
    }
    @media (max-width: 1120px){
      .app{ grid-template-columns: 1fr; }
    }

    .glass{
      border: 1px solid var(--border);
      background: color-mix(in srgb, var(--surface-2) 86%, transparent);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: var(--shadow-2);

    /* Sidebar */
    .sidebar{

    .nav button{

      ...current,
      templateId,
      title: template.title,
      monthlyContribution: current.monthlyContribution > 0
        ? current.monthlyContribution
        : Math.round(monthlyIncome * template.savingsRate),
      goalAmount: templateId === "emergency" && current.goalAmount <= 0 ? monthlyIncome : current.goalAmount,
      annualReturnPct: template.annualReturnPct,
      years: template.years,
      reviewMonths: template.reviewMonths,
      riskLevel: template.riskLevel,
      status:"draft",
      activatedAt:"",
      nextReviewDate:""
    };
    if (templateId === "emergency") {
      state.assets.plan.split = { gold:0, crypto:0, silver:0, cash:100 };
    }
    saveState();
    renderFinancePlan();
    renderInvestmentPlan();
    toast("قالب انتخاب شد؛ مبلغ‌ها و فرضیات را با شرایط خودت تنظیم کن.");
  });
  [
    "#investmentPlanTitle",
    "#investmentGoalAmount",
    "#investmentInitialAmount",
    "#investmentMonthlyContribution",
    "#investmentAnnualReturn",
    "#investmentYears",
    "#investmentReviewMonths"
  ].forEach((selector) => {
    $(selector).addEventListener("input", () => renderInvestmentProjection(readInvestmentPlanForm()));
    $(selector).addEventListener("change", () => renderInvestmentProjection(readInvestmentPlanForm()));
  });
  $("#btnSaveInvestmentPlan").addEventListener("click", () => {
    saveInvestmentPlanFromForm("draft");
    toast("پیش‌نویس پلن ذخیره شد.");
  });
  $("#btnActivateInvestmentPlan").addEventListener("click", activateInvestmentPlan);
  $("#btnResetInvestmentPlan").addEventListener("click", () => {
    const linked = state.assets.investmentPlan;
    if (!confirm("پلن پاک شود؟ یادآورهای خودکاری که این پلن ساخته نیز حذف می‌شوند؛ هدف مالی ثبت‌شده باقی می‌ماند.")) return;
    const generatedTaskIds = new Set([linked.contributionTaskId, linked.reviewTaskId].filter(Boolean));
    state.tasks = state.tasks.filter((task) => !generatedTaskIds.has(task.id));
    state.assets.investmentPlan = defaultState().assets.investmentPlan;
    saveState();
    renderInvestmentPlan();
    renderPlanner();
    toast("پلن و یادآورهای خودکار آن پاک شدند.");
  });

  $("#holdingsTbody").addEventListener("click", (e) => {
    const btn = e.target.closest("[data-act]");
    if(!btn) return;
    const id = btn.dataset.id;
    const act = btn.dataset.act;
    const h = state.assets.holdings.find(x => x.id === id);
    if(!h) return;

    if(act==="editHold"){ openHoldingDialog(h); return; }
    if(act==="delHold"){
      deleteWithUndo("دارایی", () => { state.assets.holdings = state.assets.holdings.filter(x => x.id !== id); });
    }
  });

  $("#btnHoldingSave").addEventListener("click", () => {
    const type = $("#holdType").value.trim();
    const unit = $("#holdUnit").value.trim();
    const amount = Number($("#holdAmount").value || 0);
    if(!type || !unit){ toast("نوع و واحد ضروریه."); return; }

    const patch = { type, unit, amount };

    if(editingHoldingId){
      const idx = state.assets.holdings.findIndex(x => x.id === editingHoldingId);
      if(idx >= 0) state.assets.holdings[idx] = { ...state.assets.holdings[idx], ...patch };
      toast("دارایی به‌روزرسانی شد.");
    } else {
      state.assets.holdings.unshift({ id: uid(), ...patch });
      toast("دارایی ذخیره شد.");
    }

    saveState();
    closeDlg("dlgHolding");
    renderFinance();
    renderDashboard();
    renderDashboardCharts();
  });

  $("#btnHoldingDelete").addEventListener("click", () => {
    if(!editingHoldingId) return;
    closeDlg("dlgHolding");
    deleteWithUndo("دارایی", () => { state.assets.holdings = state.assets.holdings.filter(x => x.id !== editingHoldingId); });
  });

  $("#monthlyMinIncome").addEventListener("input", (e) => { state.profile.monthlyMinIncome = Number(e.target.value || 0); saveState(); renderFinancePlan(); renderDashboard(); });
  $("#savingsRateTarget").addEventListener("input", (e) => { state.profile.savingsRateTarget = Number(e.target.value || 0); saveState(); renderFinancePlan(); renderDashboard(); });

  const bindSplit = (id, key) => {
    $(id).addEventListener("input", (e) => {
      state.assets.plan.split[key] = Number(e.target.value || 0);
      saveState(); renderFinancePlan(); renderDashboard();
    });
  };
  bindSplit("#splitGold","gold");
  bindSplit("#splitCrypto","crypto");
  bindSplit("#splitSilver","silver");
  bindSplit("#splitCash","cash");

  $("#btnNormalizeSplit").addEventListener("click", () => {
    const s = state.assets.plan.split;
    const sum = Number(s.gold||0)+Number(s.crypto||0)+Number(s.silver||0)+Number(s.cash||0);
    if(sum <= 0){ toast("اول درصدها رو وارد کن."); return; }
    s.gold = Math.round((s.gold/sum)*100);
    s.crypto = Math.round((s.crypto/sum)*100);
    s.silver = Math.round((s.silver/sum)*100);
    s.cash = 100 - (s.gold + s.crypto + s.silver);
    saveState(); renderFinancePlan(); toast("نرمال‌سازی انجام شد.");
  });

  // =========================
  // Notes
  // =========================
  const updateNotesEmpty = () => {
    const emptyNotes = !state.notes.daily && !state.notes.motivation && !state.notes.journal && !state.notes.ideas;
    $("#notesEmpty").style.display = emptyNotes ? "block" : "none";
  };

  const renderNotes = () => {
    $("#noteDaily").value = state.notes.daily || "";
    $("#noteMotivation").value = state.notes.motivation || "";
    $("#noteJournal").value = state.notes.journal || "";
    $("#noteIdeas").value = state.notes.ideas || "";
    updateNotesEmpty();
    applyEnglishDigits();
  };

  const bindNote = (id, key) => {
    $(id).addEventListener("input", (e) => {
      state.notes[key] = e.target.value;
      saveState();
      updateNotesEmpty();
      if(key === "motivation") {
        const personalQuote = $("#dashMotivation");
        personalQuote.textContent = state.notes.motivation ? `یادداشت انگیزشی شما: ${state.notes.motivation}` : "";
        personalQuote.style.display = state.notes.motivation ? "block" : "none";
      }
    });
  };
  bindNote("#noteDaily","daily");
  bindNote("#noteMotivation","motivation");
  bindNote("#noteJournal","journal");
  bindNote("#noteIdeas","ideas");

  $("#btnStartNotes").addEventListener("click", () => {
    showView("notes");
    $("#noteDaily").focus();
  });

  $("#btnGoNotes").addEventListener("click", () => showView("notes"));

  $("#btnFocusMode").addEventListener("click", () => {
    state.settings.focusMode = !state.settings.focusMode;
    saveState();
    applyFocusMode();
  });

  // =========================
  // Profile
  // =========================
  let pendingAvatarData = state.profile.avatarData || "";
  const openProfileDialog = () => {
    $("#profileName").value = state.profile.name || "";
    $("#profileTitle").value = state.profile.title || "";
    $("#profileAvatar").value = "";
    $("#profilePin").value = "";
    pendingAvatarData = state.profile.avatarData || "";
    openDlg("dlgProfile");
  };

  $("#profileButton").addEventListener("click", openProfileDialog);
  $("#btnMobileProfile").addEventListener("click", openProfileDialog);
  $("#profileButton").addEventListener("keydown", (e) => {
    if(e.key === "Enter" || e.key === " "){
      e.preventDefault();
      openProfileDialog();
    }
  });

  $("#profileAvatar").addEventListener("change", (e) => {
    const file = e.target.files && e.target.files[0];
    if(!file){ return; }
    const reader = new FileReader();
    reader.onload = () => {
      pendingAvatarData = reader.result || "";
    };
    reader.readAsDataURL(file);
  });

  $("#btnRemoveAvatar").addEventListener("click", (e) => {
    e.preventDefault();
    pendingAvatarData = "";
    $("#profileAvatar").value = "";
    toast("آواتار حذف شد.");
  });

  $("#btnProfileSave").addEventListener("click", async () => {
    const nameValue = $("#profileName").value.trim();
    const titleValue = $("#profileTitle").value.trim();
    const pinValue = normalizePin($("#profilePin").value.trim());
    if (pinValue && pinValue.length !== 4) {
      toast("پین باید 4 رقم باشد.");
      return;
    }

    state.profile.name = nameValue;
    state.profile.title = titleValue;
    state.profile.avatarData = pendingAvatarData || "";
    if (pinValue) {
      if (!hasWebCrypto()) {
        toast("مرورگر از ذخیره امن پین پشتیبانی نمی‌کند.");
        return;
      }
      try {
        const salt = generateSalt();
        state.settings.pinSalt = salt;
        state.settings.pinHash = await hashPin(pinValue, salt);
        state.settings.pinKdf = "pbkdf2-sha256";
      } catch {
        toast("خطا در ذخیره امن پین.");
        return;
      }
    } else {
      state.settings.pinSalt = "";
      state.settings.pinHash = "";
      state.settings.pinKdf = "";
    }
    if ("pin" in state.settings) delete state.settings.pin;
    if (!pinValue) {
      sessionStorage.removeItem(LOCK_SESSION_KEY);
      hideLock();
    }
    saveState();
    closeDlg("dlgProfile");
    renderHeader();
    updateLockAvailability();
    toast("پروفایل ذخیره شد.");
  });

  // =========================
  // Theme / Export / Import / Reset
  // =========================
  const toggleTheme = () => {
    const next = (state.settings.theme === "dark") ? "light" : "dark";
    state.settings.theme = next;
    saveState();
    renderHeader();
    renderDashboardCharts();
    toast(next === "dark" ? "حالت تاریک فعال شد." : "حالت روشن فعال شد.");
  };
  $("#btnTheme").addEventListener("click", toggleTheme);
  $("#btnTopTheme").addEventListener("click", toggleTheme);
  $("#btnMobileTheme").addEventListener("click", toggleTheme);

  $("#btnExport").addEventListener("click", () => {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "PlanOS-backup.json";
    a.click();
    URL.revokeObjectURL(url);
    toast("خروجی آماده شد.");
  });

  $("#btnImport").addEventListener("click", () => {
    $("#importFile").value = "";
    openDlg("dlgImport");
  });

  $("#btnWelcomeDone").addEventListener("click", () => {
    state.settings.onboarded = true;
    saveState();
    closeDlg("dlgWelcome");
    $("#btnAddTask").focus();
  });

  $("#btnRestoreDaily").addEventListener("click", async () => {
    if (!("indexedDB" in window)) {
      toast("مرورگر از بکاپ روزانه پشتیبانی نمی‌کند.");
      return;
    }
    try {
      const backups = await listDailyBackups();
      if (!backups.length) {
        toast("بکاپ روزانه‌ای پیدا نشد.");
        return;
      }
      backups.sort((a, b) => String(b.createdAt || b.dateKey).localeCompare(String(a.createdAt || a.dateKey)));
      const list = backups.map((item) => {
        const createdAt = item.createdAt ? new Date(item.createdAt) : null;
        const timeLabel = createdAt && !Number.isNaN(createdAt.valueOf())
          ? toEnglishDigits(createdAt.toLocaleString("fa-IR"))
          : item.dateKey;
        return `${item.dateKey} • ${timeLabel}`;
      }).join("\n");
      const latest = backups[0];
      const ok = confirm(`بکاپ‌های موجود:\n${list}\n\nبازگردانی آخرین بکاپ انجام شود؟`);
      if (!ok) return;
      if (!latest || !isValidBackupState(latest.data)) {
        toast("بکاپ معتبر نیست.");
        return;
      }
      const restoredState = sanitizeImportedState(latest.data);
      if (!restoredState) {
        toast("ساختار بکاپ معتبر نیست.");
        return;
      }
      state = restoredState;
      await migrateLegacyPin();
      saveState();
      renderAll();
      renderDashboardCharts();
      if (hasPinSet() && sessionStorage.getItem(LOCK_SESSION_KEY) !== "1") {
        showLock();
      }
      toast("بکاپ روزانه بازیابی شد.");
    } catch {
      toast("بازیابی بکاپ با خطا مواجه شد.");
    }
  });

  $("#btnImportDo").addEventListener("click", async () => {
    const file = $("#importFile").files && $("#importFile").files[0];
    if(!file){ toast("فایلی انتخاب نشده."); return; }
    if (file.size > IMPORT_MAX_BYTES) { toast("حجم فایل بیشتر از 5 مگابایت است."); return; }
    let importedState;
    try {
      importedState = sanitizeImportedState(safeParse(await file.text()));
    } catch {
      importedState = null;
    }
    if(!importedState){ toast("ساختار فایل بکاپ معتبر نیست."); return; }
    const summary = `${importedState.tasks.length} تسک، ${importedState.projects.length} پروژه و ${importedState.goals.length} هدف`;
    if (!confirm(`این بکاپ شامل ${summary} است و جایگزین داده فعلی می‌شود. ادامه می‌دهید؟`)) return;
    try { await saveSafetyBackup(state, "before-import"); } catch { /* localStorage remains available */ }
    state = importedState;
    await migrateLegacyPin();
    saveState();
    closeDlg("dlgImport");
    renderAll();
    renderDashboardCharts();
    if (hasPinSet() && sessionStorage.getItem(LOCK_SESSION_KEY) !== "1") {
      showLock();
    }
    toast("داده‌ها وارد شد.");
  });

  $("#btnReset").addEventListener("click", async () => {
    const ok = confirm("ریست کامل؟ همه داده‌ها پاک می‌شوند. قبلش Export بگیر.");
    if(!ok) return;
    try { await saveSafetyBackup(state, "before-reset"); } catch { /* continue with explicit confirmation */ }
    state = defaultState();
    saveState();
    sessionStorage.removeItem(LOCK_SESSION_KEY);
    hideLock();
    monthCursor = currentJalaliYM();
    plannerDate = todayISO();
    renderAll();
    renderDashboardCharts();
    toast("ریست شد.");
  });

  // =========================
  // Utilities
  // =========================
  function escapeHtml(str){
    return String(str ?? "")
      .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
      .replaceAll("\"","&quot;").replaceAll("'","&#039;");
  }

  const applyEnglishDigits = (root = document.body) => {
    const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
    let node;
    while ((node = walker.nextNode())) {
      if (!node.nodeValue || !/[۰-۹٠-٩]/.test(node.nodeValue)) continue;
      const parent = node.parentElement;
      if (parent) {
        if (parent.closest("input, textarea, select, [contenteditable]:not([contenteditable=\"false\"])")) continue;
        if (parent.tagName === "SCRIPT" || parent.tagName === "STYLE") continue;
      }
      node.nodeValue = toEnglishDigits(node.nodeValue);
    }
  };
  document.addEventListener("input", (event) => {
    const field = event.target.closest?.("input,textarea");
    if (!field || !/[۰-۹٠-٩]/.test(field.value)) return;
    const start = field.selectionStart;
    const end = field.selectionEnd;
    field.value = toEnglishDigits(field.value);
    if (typeof start === "number" && typeof field.setSelectionRange === "function") field.setSelectionRange(start, end);
  });

  // =========================
  // Render All
  // =========================
  const renderAll = ({ forceInsight = false } = {}) => {
    renderHeader();
    applyFocusMode();
    updateLockAvailability();
    renderDashboard({ forceInsight });
    renderPlanner();
    renderCalendar();
    renderProjects();
    renderGoals();
    renderFinance();
    renderNotes();
    renderReminderCenter();
    hydrateInterfaceIcons();
    applyEnglishDigits();
  };
  window.__debugInsight = () => {
    const data = getDailyInsight({ force: false });
    const ratio = data.stats.todayStats.total
      ? `${data.stats.todayStats.done}/${data.stats.todayStats.total} (${data.stats.todayStats.rate}%)`
      : "0/0 (0%)";
    const output = {
      totalTasks: data.stats.totalTasks,
      todayTasks: data.stats.todayTasks.length,
      completionRatio: ratio,
      usedCache: data.usedCache,
      insightKey: data.key,
      message: data.text
    };
    console.log("Insight Debug:", output);
    return output;
  };

  let clockTimer = null;
  let reminderTimer = null;
  const startClock = () => {
    updateFlipClock();
    if (clockTimer) clearInterval(clockTimer);
    clockTimer = setInterval(updateFlipClock, 1000);
  };

  // Init
  const boot = async () => {
    await migrateLegacyPin();
    initLock();
    bindInsightRefresh();
    bindCryptoRefresh();
    applyCryptoPricing(getCryptoCache());
    renderAll();
    const interfaceObserver = new MutationObserver(() => {
      hydrateInterfaceIcons();
      applyEnglishDigits();
    });
    interfaceObserver.observe(document.body, { childList:true, subtree:true, characterData:true });
    startClock();
    updateNotificationUI();
    if (reminderTimer) clearInterval(reminderTimer);
    reminderTimer = setInterval(() => { void checkDueReminders(); }, 30000);
    void checkDueReminders();
    renderDashboardCharts();
    void fetchCryptoPrices();
    if (isFirstRun && !state.settings.onboarded) openDlg("dlgWelcome");
  };
  window.addEventListener("focus", () => { void checkDueReminders(); });
  document.addEventListener("visibilitychange", () => { if (!document.hidden) void checkDueReminders(); });
  void boot();
})();
</script>
</body>
</html>
